<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Allied Axis is an AI-powered digital growth agency helping brands in UAE, UK & Pakistan with AI marketing, lead generation & complete digital ecosystems."
    />
    <!-- Brand accent for browser chrome (PWA / mobile); complements light page background -->
    <meta name="theme-color" content="#E05C26" />
    <meta name="sentry-dsn" content="" />
    <title>Allied Axis – AI-Powered Digital Growth Agency | UAE, UK, Pakistan</title>
    <link rel="canonical" href="https://allied-axis.netlify.app/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Favicons: PNG paths match navbar logo asset when deployed; SVG fallbacks ship in repo -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/logo/logo.png" />
    <meta property="og:title" content="Allied Axis – AI-Powered Digital Growth Agency | UAE, UK, Pakistan" />
    <meta
      property="og:description"
      content="Allied Axis is an AI-powered digital growth agency helping brands in UAE, UK & Pakistan with AI marketing, lead generation & complete digital ecosystems."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://allied-axis.netlify.app/" />
    <meta property="og:image" content="https://allied-axis.netlify.app/assets/images/social/allied-axis-og.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Allied Axis" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Allied Axis",
        "url": "https://allied-axis.netlify.app",
        "logo": "https://allied-axis.netlify.app/assets/images/logo/logo.png",
        "description": "AI-powered digital growth agency",
        "areaServed": ["UAE", "UK", "Pakistan"],
        "serviceType": [
          "Digital Marketing",
          "AI Marketing",
          "Lead Generation",
          "Web Development",
          "Brand Strategy"
        ]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Netlify Forms: register at build time (must be in body, valid HTML) -->
    <form
      name="home-contact"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
      aria-hidden="true"
    >
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="business" />
      <select name="service"><option>Essential</option></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="lead-audit" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>
    <form name="quote-request-home" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="contact-page" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="business" />
      <select name="service"><option>Essential Launch ($980)</option></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="quote-request-contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="quote-request-faq" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="quote-request-about" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="quote-request-pricing" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden aria-hidden="true">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
