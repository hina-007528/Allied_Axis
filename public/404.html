<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found | Allied Axis</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #232b5c;
        --blue: #e05c26;
        --bg: #f4f6fb;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--navy);
      }
      .wrap {
        text-align: center;
        max-width: 420px;
      }
      .num {
        font-family: Poppins, sans-serif;
        font-weight: 900;
        font-size: clamp(4rem, 12vw, 6rem);
        line-height: 1;
        background: linear-gradient(135deg, var(--blue), var(--navy));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      h1 {
        font-family: Poppins, sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        margin: 1rem 0 0.75rem;
      }
      p {
        font-size: 1rem;
        line-height: 1.65;
        margin-bottom: 1.75rem;
        opacity: 0.88;
      }
      a {
        display: inline-block;
        font-family: Poppins, sans-serif;
        font-weight: 700;
        font-size: 0.94rem;
        padding: 14px 28px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(165deg, var(--blue) 0%, #c8511f 100%);
        box-shadow: 0 4px 20px rgba(224, 92, 38, 0.22);
      }
      a:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="num" aria-hidden="true">404</div>
      <h1>Page Not Found</h1>
      <p>Looks like this page doesn't exist.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
